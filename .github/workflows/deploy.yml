# Builds the Vite app and deploys the compiled bundle to Netlify.
#
# Why this exists: relying on Netlify's own git build has repeatedly left the
# site serving the raw source index.html (which points at /src/main.jsx). That
# raw module can't run in production, so the browser rejects it with
# "Failed to load module script ... MIME type of application/octet-stream" and
# the page comes up white. This workflow makes the deploy deterministic and
# controlled from the repo: it always runs `npm ci && npm run build` and
# publishes the resulting dist/ folder as the live production deploy.
#
# One-time setup required in the GitHub repo
# (Settings -> Secrets and variables -> Actions -> New repository secret):
#   NETLIFY_AUTH_TOKEN  - a Netlify personal access token
#                         (Netlify: User settings -> Applications -> New access token)
#   NETLIFY_SITE_ID     - the target site's API ID
#                         (Netlify: Site configuration -> General -> Site details -> Site ID)
#
# After adding those secrets, every push to the default branch deploys the
# built site. To avoid two competing deploys, turn OFF Netlify's own
# auto-publishing for this site (Site configuration -> Build & deploy ->
# Continuous deployment -> Build settings -> Stop builds), so this workflow is
# the single source of production deploys.

name: Deploy to Netlify

on:
  push:
    branches:
      - claude/cultureconnect-marketplace-ln222a
  workflow_dispatch:

# Cancel an in-progress deploy if a newer commit is pushed.
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      # Preflight: fail fast with a clear message if the deploy secrets are
      # missing. Without this, netlify-cli falls back to an interactive browser
      # login that just hangs for 5 minutes and then errors with "Timed out
      # waiting for authorization" — which looks like a Netlify problem but is
      # really an unset-secret problem. See the repo secrets setup notes above.
      - name: Verify Netlify secrets are configured
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          missing=""
          [ -z "$NETLIFY_AUTH_TOKEN" ] && missing="$missing NETLIFY_AUTH_TOKEN"
          [ -z "$NETLIFY_SITE_ID" ] && missing="$missing NETLIFY_SITE_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repository secret(s):$missing"
            echo "Add them under Settings -> Secrets and variables -> Actions."
            echo "  NETLIFY_AUTH_TOKEN - Netlify user token (User settings -> Applications -> New access token)"
            echo "  NETLIFY_SITE_ID    - Netlify site API ID (Site configuration -> General -> Site details)"
            echo "Until these are set, builds succeed but nothing is published, so the live site stays stale."
            exit 1
          fi

      - name: Deploy dist/ to Netlify (production)
        run: npx --yes netlify-cli@17 deploy --prod --dir=dist --message "Deploy ${{ github.sha }} from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
